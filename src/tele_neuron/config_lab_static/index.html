<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeleNeuron Config Lab</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --line: #d7dee8;
      --line-strong: #b9c4d2;
      --text: #18202d;
      --muted: #627084;
      --teal: #008f8a;
      --blue: #1266f1;
      --orange: #f08a1a;
      --red: #d93025;
      --shadow: 0 14px 34px rgba(26, 40, 58, 0.09);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      min-width: 1120px;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.primary {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
      font-weight: 700;
    }

    button.danger {
      color: var(--red);
      border-color: #f0b6b1;
    }

    button.small {
      height: 28px;
      padding: 0 9px;
      font-size: 12px;
    }

    input, select, textarea {
      border: 1px solid var(--line);
      background: white;
      border-radius: 6px;
      color: var(--text);
    }

    input, select {
      height: 32px;
      padding: 0 8px;
      width: 100%;
    }

    textarea {
      width: 100%;
      min-height: 178px;
      resize: vertical;
      padding: 10px 12px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .menu {
      width: 28px;
      height: 28px;
      border: 0;
      padding: 0;
      font-size: 22px;
      background: transparent;
    }

    .title {
      font-size: 20px;
      font-weight: 760;
      margin-right: auto;
    }

    .config-select {
      width: 220px;
    }

    .app {
      display: grid;
      grid-template-columns: 68px 292px minmax(540px, 1fr) 330px;
      grid-template-rows: calc(100vh - 56px - 178px) 178px;
      min-height: calc(100vh - 56px);
    }

    .rail {
      background: #fbfcfe;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding-top: 6px;
    }

    .rail button {
      height: 68px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      gap: 3px;
      font-size: 12px;
    }

    .rail button.active {
      color: var(--teal);
      border-left: 3px solid var(--teal);
      background: #eefaf8;
    }

    .rail .icon {
      font-size: 21px;
      line-height: 1;
    }

    .left, .right, .json-panel, .stats-panel {
      background: var(--surface);
    }

    .left {
      border-right: 1px solid var(--line);
      overflow: auto;
      padding: 18px 18px 26px;
    }

    .right {
      border-left: 1px solid var(--line);
      overflow: auto;
      padding: 18px 20px 26px;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .canvas-toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
    }

    .canvas-title {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .canvas-stage {
      flex: 1;
      padding: 0 18px 18px;
      min-height: 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: white;
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      cursor: crosshair;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }

    h3 {
      margin: 20px 0 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .list {
      display: grid;
      gap: 6px;
    }

    .item {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 31px;
      padding: 5px 7px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .item:hover, .item.selected {
      border-color: var(--line);
      background: #f7fafc;
    }

    .dot, .zone-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 2px white, 0 0 0 3px var(--line-strong);
    }

    .zone-swatch {
      border-radius: 2px;
      background: rgba(18, 102, 241, 0.15);
      box-shadow: inset 0 0 0 2px var(--blue);
    }

    .mono {
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .json-panel {
      grid-column: 1 / 4;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 170px 1fr;
      min-height: 0;
    }

    .json-label {
      padding: 18px;
      color: var(--teal);
      font-weight: 700;
      border-right: 1px solid var(--line);
    }

    .json-body {
      padding: 12px;
      min-width: 0;
    }

    .stats-panel {
      border-left: 1px solid var(--line);
      border-top: 1px solid var(--line);
      padding: 16px 18px;
      overflow: auto;
    }

    .status {
      min-height: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.ok { color: #137333; }
    .status.bad { color: var(--red); }

    .preview-image {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      margin-top: 10px;
      display: none;
    }

    .cases {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .cases th, .cases td {
      border-bottom: 1px solid var(--line);
      padding: 5px 3px;
      text-align: left;
    }

    .cases input {
      height: 27px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <button class="menu" title="Menu">☰</button>
    <div class="title">TeleNeuron Config Lab</div>
    <select id="configSelect" class="config-select" title="Config file"></select>
    <button id="loadBtn">Load</button>
    <button id="previewBtn">▶ Run Preview</button>
    <button id="saveBtn" class="primary">⇩ Export Config</button>
  </header>

  <main class="app">
    <nav class="rail">
      <button class="active" data-panel="space"><span class="icon">◇</span><span>Space</span></button>
      <button data-panel="emitters"><span class="icon">✣</span><span>Emitters</span></button>
      <button data-panel="readouts"><span class="icon">◎</span><span>Readouts</span></button>
      <button data-panel="cases"><span class="icon">▦</span><span>Cases</span></button>
    </nav>

    <aside class="left">
      <section id="panel-space">
        <h2>Space</h2>
        <div class="stack">
          <label>Name<input id="nameInput"></label>
          <label>Task<input id="taskInput"></label>
          <div class="grid-3">
            <label>x<input id="spaceX" type="number" step="0.1"></label>
            <label>y<input id="spaceY" type="number" step="0.1"></label>
            <label>z<input id="spaceZ" type="number" step="0.1"></label>
          </div>
          <div class="grid-2">
            <label>cell_size<input id="cellSize" type="number" step="0.01"></label>
            <label>seed<input id="seed" type="number" step="1"></label>
          </div>
          <div class="grid-2">
            <label>steps<input id="steps" type="number" step="1"></label>
            <label>dt<input id="dt" type="number" step="0.01"></label>
          </div>
          <div class="grid-2">
            <label>damping<input id="damping" type="number" step="0.001"></label>
            <label>restitution<input id="restitution" type="number" step="0.01"></label>
          </div>
        </div>

        <div class="section stack">
          <h3>Balls</h3>
          <div class="grid-2">
            <label>count<input id="ballCount" type="number" step="1"></label>
            <label>radius<input id="ballRadius" type="number" step="0.01"></label>
          </div>
          <div class="grid-2">
            <label>mass<input id="ballMass" type="number" step="0.01"></label>
            <label>initial_speed<input id="initialSpeed" type="number" step="0.01"></label>
          </div>
        </div>

        <div class="section stack">
          <h3>Input Force</h3>
          <div class="grid-2">
            <label>strength<input id="inputStrength" type="number" step="0.001"></label>
            <label>epsilon<input id="epsilon" type="number" step="0.000001"></label>
          </div>
        </div>
      </section>

      <section id="panel-emitters" hidden>
        <div class="row"><h2>Emitters</h2><button id="addEmitter" class="small">+ Add</button></div>
        <div id="emitterList" class="list"></div>
      </section>

      <section id="panel-readouts" hidden>
        <div class="row"><h2>Readouts</h2><button id="addReadout" class="small">+ Add</button></div>
        <div id="readoutList" class="list"></div>
      </section>

      <section id="panel-cases" hidden>
        <div class="row"><h2>Cases</h2><button id="addCase" class="small">+ Add</button></div>
        <table class="cases">
          <thead><tr><th>bits</th><th>target</th><th></th></tr></thead>
          <tbody id="caseRows"></tbody>
        </table>
      </section>
    </aside>

    <section class="canvas-wrap">
      <div class="canvas-toolbar">
        <button id="selectTool" class="primary">Pointer</button>
        <button id="fitBtn">Fit</button>
        <input id="previewBits" placeholder="preview bits, e.g. 01" style="width: 190px">
        <span class="canvas-title">XY Plane, z as color</span>
      </div>
      <div class="canvas-stage">
        <canvas id="labCanvas" width="980" height="690"></canvas>
      </div>
    </section>

    <aside class="right">
      <h2 id="inspectorTitle">Inspector</h2>
      <div id="inspector" class="stack"></div>
      <img id="previewImage" class="preview-image" alt="Preview snapshot">
    </aside>

    <section class="json-panel">
      <div class="json-label">Preview JSON</div>
      <div class="json-body">
        <textarea id="jsonText" spellcheck="false"></textarea>
        <div class="row" style="margin-top: 8px">
          <button id="applyJson" class="small">Apply JSON</button>
          <div id="status" class="status">Loading...</div>
        </div>
      </div>
    </section>

    <aside class="stats-panel">
      <div class="stack">
        <div class="row"><span>Emitters</span><strong id="statEmitters">0</strong></div>
        <div class="row"><span>Readouts</span><strong id="statReadouts">0</strong></div>
        <div class="row"><span>Cases</span><strong id="statCases">0</strong></div>
        <div class="row"><span>Space Size</span><strong id="statSpace">-</strong></div>
        <div class="row"><span>Config Valid</span><strong id="statValid">-</strong></div>
        <pre id="previewResult" class="mono"></pre>
      </div>
    </aside>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const canvas = $("labCanvas");
    const ctx = canvas.getContext("2d");

    let config = null;
    let selected = { type: "emitter", index: 0 };
    let drag = null;
    let jsonDirty = false;

    const defaultConfig = {
      name: "lab_config",
      task: "CUSTOM",
      space: { size: [4, 4, 3] },
      simulation: { steps: 24, dt: 1, damping: 0.99, restitution: 0.9, cell_size: 0.5, seed: 1 },
      balls: { count: 96, mass: 1, radius: 0.08, initial_speed: 0.05 },
      input: { points: [[0.75, 0.75, 1.5], [3.25, 0.75, 1.5]], strength: 0.08, epsilon: 0.000001 },
      readout: [{ name: "out1", center: [2, 3.25, 1.5], half_extents: [0.5, 0.5, 1.5], threshold: 3 }],
      cases: [
        { bits: [0, 0], target: [0] },
        { bits: [0, 1], target: [1] },
        { bits: [1, 0], target: [1] },
        { bits: [1, 1], target: [0] }
      ]
    };

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeConfig() {
      if (!config.input) config.input = { points: [], strength: 0.08, epsilon: 0.000001 };
      if (!Array.isArray(config.input.points)) config.input.points = [];
      if (!Array.isArray(config.readout)) config.readout = [];
      if (!Array.isArray(config.cases)) config.cases = [];
      config.cases.forEach((row) => {
        row.bits = normalizeArray(row.bits, config.input.points.length);
        row.target = normalizeArray(Array.isArray(row.target) ? row.target : [row.target], config.readout.length);
      });
    }

    function normalizeArray(value, length) {
      const arr = Array.isArray(value) ? value.map((item) => Number(item) ? 1 : 0) : [];
      while (arr.length < length) arr.push(0);
      return arr.slice(0, length);
    }

    function numberInput(id, path) {
      $(id).value = getPath(path);
      $(id).oninput = () => updatePath(path, Number($(id).value));
    }

    function textInput(id, path) {
      $(id).value = getPath(path);
      $(id).oninput = () => updatePath(path, $(id).value);
    }

    function getPath(path) {
      return path.reduce((value, key) => value[key], config);
    }

    function updatePath(path, value) {
      let target = config;
      for (let i = 0; i < path.length - 1; i++) target = target[path[i]];
      target[path[path.length - 1]] = value;
      normalizeConfig();
      syncAll();
    }

    function bindForm() {
      textInput("nameInput", ["name"]);
      textInput("taskInput", ["task"]);
      numberInput("spaceX", ["space", "size", 0]);
      numberInput("spaceY", ["space", "size", 1]);
      numberInput("spaceZ", ["space", "size", 2]);
      numberInput("cellSize", ["simulation", "cell_size"]);
      numberInput("seed", ["simulation", "seed"]);
      numberInput("steps", ["simulation", "steps"]);
      numberInput("dt", ["simulation", "dt"]);
      numberInput("damping", ["simulation", "damping"]);
      numberInput("restitution", ["simulation", "restitution"]);
      numberInput("ballCount", ["balls", "count"]);
      numberInput("ballRadius", ["balls", "radius"]);
      numberInput("ballMass", ["balls", "mass"]);
      numberInput("initialSpeed", ["balls", "initial_speed"]);
      numberInput("inputStrength", ["input", "strength"]);
      numberInput("epsilon", ["input", "epsilon"]);
    }

    function syncAll() {
      normalizeConfig();
      bindForm();
      renderLists();
      renderCases();
      renderInspector();
      renderCanvas();
      renderStats();
      if (!jsonDirty) $("jsonText").value = JSON.stringify(config, null, 2);
      validate();
    }

    function renderLists() {
      $("emitterList").innerHTML = "";
      config.input.points.forEach((point, index) => {
        const item = document.createElement("div");
        item.className = "item" + (selected.type === "emitter" && selected.index === index ? " selected" : "");
        item.innerHTML = `<span class="dot" style="background:${zColor(point[2])}"></span><strong>E${index + 1}</strong><span class="mono">(${fmt(point[0])}, ${fmt(point[1])}, ${fmt(point[2])})</span>`;
        item.onclick = () => { selected = { type: "emitter", index }; syncAll(); };
        $("emitterList").appendChild(item);
      });

      $("readoutList").innerHTML = "";
      config.readout.forEach((zone, index) => {
        const item = document.createElement("div");
        item.className = "item" + (selected.type === "readout" && selected.index === index ? " selected" : "");
        item.innerHTML = `<span class="zone-swatch"></span><strong>${zone.name}</strong><span class="mono">thr ${zone.threshold}</span>`;
        item.onclick = () => { selected = { type: "readout", index }; syncAll(); };
        $("readoutList").appendChild(item);
      });
    }

    function renderCases() {
      const body = $("caseRows");
      body.innerHTML = "";
      config.cases.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input value="${row.bits.join("")}" data-case="${index}" data-kind="bits"></td>
          <td><input value="${row.target.join("")}" data-case="${index}" data-kind="target"></td>
          <td><button class="small danger" data-delete="${index}">Delete</button></td>
        `;
        body.appendChild(tr);
      });
      body.querySelectorAll("input").forEach((input) => {
        input.onchange = () => {
          const index = Number(input.dataset.case);
          const values = input.value.trim().split("").map((char) => char === "1" ? 1 : 0);
          config.cases[index][input.dataset.kind] = values;
          normalizeConfig();
          syncAll();
        };
      });
      body.querySelectorAll("button[data-delete]").forEach((button) => {
        button.onclick = () => {
          config.cases.splice(Number(button.dataset.delete), 1);
          syncAll();
        };
      });
    }

    function renderInspector() {
      const target = selected.type === "readout" ? config.readout[selected.index] : config.input.points[selected.index];
      const inspector = $("inspector");
      if (!target) {
        $("inspectorTitle").textContent = "Inspector";
        inspector.innerHTML = "<p class='mono'>Select an emitter or readout.</p>";
        return;
      }

      if (selected.type === "emitter") {
        $("inspectorTitle").textContent = `Emitter E${selected.index + 1}`;
        inspector.innerHTML = `
          <div class="grid-3">
            ${field("x", target[0], "em-x")}
            ${field("y", target[1], "em-y")}
            ${field("z", target[2], "em-z")}
          </div>
          <div class="grid-2">
            <button id="cloneSelected">Clone Emitter</button>
            <button id="deleteSelected" class="danger">Delete Emitter</button>
          </div>
        `;
        bindInspectorNumber("em-x", (v) => target[0] = v);
        bindInspectorNumber("em-y", (v) => target[1] = v);
        bindInspectorNumber("em-z", (v) => target[2] = v);
      } else {
        $("inspectorTitle").textContent = "Readout Inspector";
        inspector.innerHTML = `
          <label>Output Label<input id="ro-name" value="${escapeHtml(target.name)}"></label>
          <div class="grid-3">
            ${field("x", target.center[0], "ro-x")}
            ${field("y", target.center[1], "ro-y")}
            ${field("z", target.center[2], "ro-z")}
          </div>
          <div class="grid-3">
            ${field("width", target.half_extents[0] * 2, "ro-w")}
            ${field("height", target.half_extents[1] * 2, "ro-h")}
            ${field("z range", target.half_extents[2] * 2, "ro-d")}
          </div>
          ${field("threshold", target.threshold, "ro-thr", 1)}
          <div class="grid-2">
            <button id="cloneSelected">Clone Readout</button>
            <button id="deleteSelected" class="danger">Delete Readout</button>
          </div>
        `;
        $("ro-name").oninput = () => { target.name = $("ro-name").value; syncAll(); };
        bindInspectorNumber("ro-x", (v) => target.center[0] = v);
        bindInspectorNumber("ro-y", (v) => target.center[1] = v);
        bindInspectorNumber("ro-z", (v) => target.center[2] = v);
        bindInspectorNumber("ro-w", (v) => target.half_extents[0] = Math.max(0.01, v / 2));
        bindInspectorNumber("ro-h", (v) => target.half_extents[1] = Math.max(0.01, v / 2));
        bindInspectorNumber("ro-d", (v) => target.half_extents[2] = Math.max(0.01, v / 2));
        bindInspectorNumber("ro-thr", (v) => target.threshold = Math.max(0, Math.round(v)));
      }

      $("cloneSelected").onclick = cloneSelected;
      $("deleteSelected").onclick = deleteSelected;
    }

    function field(label, value, id, step = 0.01) {
      return `<label>${label}<input id="${id}" type="number" step="${step}" value="${Number(value)}"></label>`;
    }

    function bindInspectorNumber(id, setter) {
      $(id).oninput = () => {
        setter(Number($(id).value));
        normalizeConfig();
        syncAll();
      };
    }

    function renderStats() {
      $("statEmitters").textContent = config.input.points.length;
      $("statReadouts").textContent = config.readout.length;
      $("statCases").textContent = config.cases.length;
      $("statSpace").textContent = config.space.size.map(fmt).join(" x ");
    }

    function renderCanvas() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(600, Math.floor(rect.width * scale));
      canvas.height = Math.max(420, Math.floor(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);
      drawBackground(width, height);
      drawReadouts();
      drawEmitters();
      drawAxes(width, height);
    }

    function bounds() {
      return { x: config.space.size[0], y: config.space.size[1], z: config.space.size[2] };
    }

    function toCanvas(point) {
      const pad = 40;
      const b = bounds();
      return {
        x: pad + (point[0] / b.x) * (canvas.clientWidth - pad * 2),
        y: canvas.clientHeight - pad - (point[1] / b.y) * (canvas.clientHeight - pad * 2)
      };
    }

    function fromCanvas(x, y, z = 0) {
      const pad = 40;
      const b = bounds();
      return [
        clamp(((x - pad) / (canvas.clientWidth - pad * 2)) * b.x, 0, b.x),
        clamp(((canvas.clientHeight - pad - y) / (canvas.clientHeight - pad * 2)) * b.y, 0, b.y),
        clamp(z, 0, b.z)
      ];
    }

    function drawBackground(width, height) {
      const gradient = ctx.createLinearGradient(40, height - 40, width - 40, 40);
      gradient.addColorStop(0, "#9bc9ff");
      gradient.addColorStop(0.45, "#d9f2cb");
      gradient.addColorStop(0.7, "#ffe39a");
      gradient.addColorStop(1, "#ff9c8c");
      ctx.fillStyle = gradient;
      ctx.fillRect(40, 40, width - 80, height - 80);
      ctx.strokeStyle = "#b9c4d2";
      ctx.strokeRect(40, 40, width - 80, height - 80);
      ctx.globalAlpha = 0.32;
      ctx.strokeStyle = "#8da0b5";
      for (let i = 1; i < 12; i++) {
        const x = 40 + (i / 12) * (width - 80);
        const y = 40 + (i / 12) * (height - 80);
        ctx.beginPath(); ctx.moveTo(x, 40); ctx.lineTo(x, height - 40); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(width - 40, y); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawAxes(width, height) {
      ctx.fillStyle = "#18202d";
      ctx.font = "600 14px Inter, sans-serif";
      ctx.fillText("x", width / 2, height - 12);
      ctx.fillText("y", 16, height / 2);
    }

    function drawEmitters() {
      config.input.points.forEach((point, index) => {
        const pos = toCanvas(point);
        ctx.beginPath();
        ctx.fillStyle = zColor(point[2]);
        ctx.strokeStyle = selected.type === "emitter" && selected.index === index ? "#18202d" : "white";
        ctx.lineWidth = 3;
        ctx.arc(pos.x, pos.y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#18202d";
        ctx.font = "600 12px Inter, sans-serif";
        ctx.fillText(`E${index + 1}`, pos.x + 10, pos.y - 8);
      });
    }

    function drawReadouts() {
      config.readout.forEach((zone, index) => {
        const center = toCanvas(zone.center);
        const b = bounds();
        const w = (zone.half_extents[0] * 2 / b.x) * (canvas.clientWidth - 80);
        const h = (zone.half_extents[1] * 2 / b.y) * (canvas.clientHeight - 80);
        ctx.fillStyle = "rgba(18, 102, 241, 0.12)";
        ctx.strokeStyle = selected.type === "readout" && selected.index === index ? "#f08a1a" : "#1266f1";
        ctx.lineWidth = 2;
        ctx.setLineDash([7, 5]);
        ctx.fillRect(center.x - w / 2, center.y - h / 2, w, h);
        ctx.strokeRect(center.x - w / 2, center.y - h / 2, w, h);
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.fillStyle = "#1266f1";
        ctx.arc(center.x, center.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0b57d0";
        ctx.font = "700 14px Inter, sans-serif";
        ctx.fillText(zone.name, center.x + 8, center.y - h / 2 - 8);
      });
    }

    function hitTest(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      for (let i = config.input.points.length - 1; i >= 0; i--) {
        const pos = toCanvas(config.input.points[i]);
        if (Math.hypot(pos.x - x, pos.y - y) < 14) return { type: "emitter", index: i };
      }
      for (let i = config.readout.length - 1; i >= 0; i--) {
        const zone = config.readout[i];
        const center = toCanvas(zone.center);
        const b = bounds();
        const w = (zone.half_extents[0] * 2 / b.x) * (canvas.clientWidth - 80);
        const h = (zone.half_extents[1] * 2 / b.y) * (canvas.clientHeight - 80);
        if (x >= center.x - w / 2 && x <= center.x + w / 2 && y >= center.y - h / 2 && y <= center.y + h / 2) {
          return { type: "readout", index: i };
        }
      }
      return null;
    }

    canvas.addEventListener("pointerdown", (event) => {
      const hit = hitTest(event.clientX, event.clientY);
      if (hit) {
        selected = hit;
        drag = hit;
        canvas.setPointerCapture(event.pointerId);
        syncAll();
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!drag) return;
      const rect = canvas.getBoundingClientRect();
      const local = fromCanvas(event.clientX - rect.left, event.clientY - rect.top, currentZ(drag));
      if (drag.type === "emitter") {
        config.input.points[drag.index] = local;
      } else {
        config.readout[drag.index].center = local;
      }
      syncAll();
    });

    canvas.addEventListener("pointerup", () => {
      drag = null;
    });

    function currentZ(selection) {
      return selection.type === "emitter"
        ? config.input.points[selection.index][2]
        : config.readout[selection.index].center[2];
    }

    function addEmitter() {
      const b = bounds();
      config.input.points.push([b.x / 2, b.y / 2, b.z / 2]);
      normalizeConfig();
      selected = { type: "emitter", index: config.input.points.length - 1 };
      syncAll();
    }

    function addReadout() {
      const b = bounds();
      config.readout.push({
        name: `out${config.readout.length + 1}`,
        center: [b.x / 2, b.y / 2, b.z / 2],
        half_extents: [b.x / 10, b.y / 10, b.z / 2],
        threshold: 1
      });
      normalizeConfig();
      selected = { type: "readout", index: config.readout.length - 1 };
      syncAll();
    }

    function cloneSelected() {
      if (selected.type === "emitter") {
        config.input.points.push(clone(config.input.points[selected.index]));
        selected.index = config.input.points.length - 1;
      } else {
        const copy = clone(config.readout[selected.index]);
        copy.name = `${copy.name}_copy`;
        config.readout.push(copy);
        selected.index = config.readout.length - 1;
      }
      normalizeConfig();
      syncAll();
    }

    function deleteSelected() {
      if (selected.type === "emitter" && config.input.points.length > 1) {
        config.input.points.splice(selected.index, 1);
        selected.index = Math.max(0, selected.index - 1);
      }
      if (selected.type === "readout" && config.readout.length > 1) {
        config.readout.splice(selected.index, 1);
        selected.index = Math.max(0, selected.index - 1);
      }
      normalizeConfig();
      syncAll();
    }

    async function loadConfigList() {
      const response = await fetch("/api/configs");
      const data = await response.json();
      $("configSelect").innerHTML = "";
      data.configs.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.path;
        option.textContent = item.path;
        $("configSelect").appendChild(option);
      });
      if (data.configs.length) await loadSelectedConfig();
      else {
        config = clone(defaultConfig);
        syncAll();
      }
    }

    async function loadSelectedConfig() {
      const path = $("configSelect").value;
      const response = await fetch(`/api/config?path=${encodeURIComponent(path)}`);
      const data = await response.json();
      config = data.config;
      normalizeConfig();
      jsonDirty = false;
      syncAll();
    }

    async function validate() {
      const response = await fetch("/api/validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ config })
      });
      const data = await response.json();
      const status = $("status");
      $("statValid").textContent = data.valid ? "Yes" : "No";
      status.className = data.valid ? "status ok" : "status bad";
      status.textContent = data.valid ? "Config valid" : data.errors.join("; ");
    }

    async function saveConfig() {
      const response = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ config })
      });
      const data = await response.json();
      if (data.saved) {
        $("status").className = "status ok";
        $("status").textContent = `Saved ${data.path}`;
        await loadConfigList();
      } else {
        $("status").className = "status bad";
        $("status").textContent = data.errors.join("; ");
      }
    }

    async function runPreview() {
      const bits = $("previewBits").value.trim();
      const response = await fetch("/api/preview", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ config, bits: bits || undefined })
      });
      const data = await response.json();
      if (!data.valid) {
        $("status").className = "status bad";
        $("status").textContent = data.errors.join("; ");
        return;
      }
      const preview = data.preview;
      const result = preview.result;
      $("previewResult").textContent = `${result.config_name}\nscore ${result.score}/${result.total}\naccuracy ${(result.accuracy * 100).toFixed(1)}%\n` +
        result.cases.map((row) => `bits=${row.bits.join("")} out=${row.output.join("")} counts=${row.counts.join(",")} ${row.correct ? "ok" : "miss"}`).join("\n");
      $("previewImage").src = preview.image_url + `?t=${Date.now()}`;
      $("previewImage").style.display = "block";
      $("status").className = "status ok";
      $("status").textContent = "Preview complete";
    }

    function zColor(z) {
      const max = Math.max(0.000001, config?.space?.size?.[2] ?? 1);
      const t = clamp(z / max, 0, 1);
      const hue = 210 - t * 190;
      return `hsl(${hue}, 86%, 45%)`;
    }

    function fmt(value) {
      return Number(value).toFixed(2).replace(/\.00$/, "");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    document.querySelectorAll(".rail button").forEach((button) => {
      button.onclick = () => {
        document.querySelectorAll(".rail button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        ["space", "emitters", "readouts", "cases"].forEach((panel) => {
          $(`panel-${panel}`).hidden = panel !== button.dataset.panel;
        });
      };
    });

    $("loadBtn").onclick = loadSelectedConfig;
    $("saveBtn").onclick = saveConfig;
    $("previewBtn").onclick = runPreview;
    $("addEmitter").onclick = addEmitter;
    $("addReadout").onclick = addReadout;
    $("addCase").onclick = () => {
      config.cases.push({ bits: normalizeArray([], config.input.points.length), target: normalizeArray([], config.readout.length) });
      syncAll();
    };
    $("fitBtn").onclick = renderCanvas;
    $("jsonText").oninput = () => { jsonDirty = true; };
    $("applyJson").onclick = () => {
      try {
        config = JSON.parse($("jsonText").value);
        normalizeConfig();
        jsonDirty = false;
        syncAll();
      } catch (error) {
        $("status").className = "status bad";
        $("status").textContent = error.message;
      }
    };
    window.addEventListener("resize", renderCanvas);

    loadConfigList().catch((error) => {
      config = clone(defaultConfig);
      $("status").className = "status bad";
      $("status").textContent = error.message;
      syncAll();
    });
  </script>
</body>
</html>
